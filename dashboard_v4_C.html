<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121210; --card: #1a1a17; --elevated: #222220;
  --text: #e8e4dc; --text2: #908a7e; --text3: #5e5a52;
  --accent: #d4a853; --accent2: #e8734a;
  --border: #2a2825; --success: #7ec87e; --danger: #e85a5a;
  --warning: #d4a853;
  --radius: 14px; --radius-sm: 10px;
  --font-num: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; }
.app { max-width:920px; margin:0 auto; padding:32px 24px 60px; }

/* Header */
.header { display:flex; align-items:center; gap:20px; margin-bottom:36px; padding:28px; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); }
.avatar { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; color:#fff; flex-shrink:0; font-family:var(--font-num); }
.header-info { flex:1; }
.header-name { font-family:var(--font-num); font-size:24px; font-weight:800; letter-spacing:-0.5px; }
.header-id { color:var(--text2); font-size:13px; font-weight:500; margin-top:2px; }
.header-id span { font-family:var(--font-num); }
.header-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(212,168,83,0.1); color:var(--accent); padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; margin-top:8px; border:1px solid rgba(212,168,83,0.2); }
.header-reg { color:var(--text3); font-size:11px; margin-top:4px; }

/* Month */
.month-selector { display:flex; gap:6px; margin-bottom:28px; overflow-x:auto; padding-bottom:4px; }
.month-btn { padding:9px 20px; border-radius:100px; border:1px solid var(--border); background:var(--card); color:var(--text2); font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; font-family:'Noto Sans JP',sans-serif; }
.month-btn:hover { border-color:var(--accent); color:var(--text); }
.month-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* KPI */
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }
.kpi-row-2 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px 20px; transition:all .2s; }
.kpi-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.06); }
.kpi-label { font-size:11px; color:var(--text3); font-weight:600; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px; }
.kpi-value { font-family:var(--font-num); font-size:30px; font-weight:800; letter-spacing:-1.5px; line-height:1.1; }
.kpi-value.diamond { color:var(--accent); }
.kpi-value.revenue { color:var(--accent2); }
.kpi-unit { font-size:14px; font-weight:500; color:var(--text3); margin-left:2px; letter-spacing:0; }
.kpi-sub { font-size:11px; color:var(--text3); margin-top:5px; font-weight:500; }
.kpi-trend { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; margin-top:8px; padding:3px 10px; border-radius:20px; font-family:var(--font-num); }
.kpi-trend.up { color:var(--success); background:rgba(26,135,84,0.08); }
.kpi-trend.down { color:var(--danger); background:rgba(214,48,49,0.08); }

/* Section */
.section-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; margin-bottom:20px; }
.section-title { font-size:14px; font-weight:700; margin-bottom:20px; letter-spacing:0.3px; display:flex; align-items:center; gap:8px; }
.section-title .dot { width:6px; height:6px; border-radius:50%; }
.dot-a { background:var(--accent); } .dot-b { background:var(--accent2); } .dot-c { background:var(--warning); }

/* Ranking inline */
.ranking-inline { display:flex; align-items:center; gap:16px; padding:18px 24px; background:var(--elevated); border-radius:var(--radius-sm); }
.ranking-pos { font-family:var(--font-num); font-size:36px; font-weight:800; letter-spacing:-2px; color:var(--accent); }
.ranking-detail { flex:1; }
.ranking-label { font-size:12px; color:var(--text3); font-weight:600; }
.ranking-total { font-size:12px; color:var(--text3); margin-top:2px; }

/* Chart */
.chart-container { position:relative; height:200px; display:flex; align-items:flex-end; padding-left:44px; padding-bottom:32px; }
.chart-y-axis { position:absolute; left:0; top:0; bottom:32px; width:44px; display:flex; flex-direction:column; justify-content:space-between; align-items:flex-end; padding-right:8px; }
.chart-y-label { font-size:10px; color:var(--text3); font-family:var(--font-num); font-weight:500; }
.chart-bar-group { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
.chart-bar-wrapper { width:100%; height:148px; display:flex; align-items:flex-end; justify-content:center; }
.chart-bar { width:48px; border-radius:6px 6px 2px 2px; position:relative; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); transform-origin:bottom; }
.chart-bar:hover { opacity:0.8; }
.chart-bar-value { position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-family:var(--font-num); font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; }
.chart-x-label { font-size:12px; color:var(--text2); font-weight:600; }
.chart-bar.bar-active { background:linear-gradient(180deg, var(--accent), rgba(212,168,83,0.4)); }
.chart-bar.bar-inactive { background:rgba(255,255,255,0.08); }
@keyframes barGrow { from{transform:scaleY(0)} to{transform:scaleY(1)} }
.bar-animate { animation:barGrow .7s cubic-bezier(.34,1.56,.64,1) forwards; transform-origin:bottom; }

/* Goal */
.goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.goal-percentage { font-family:var(--font-num); font-size:24px; font-weight:800; color:var(--accent); letter-spacing:-1px; }
.goal-bar-track { width:100%; height:10px; background:var(--elevated); border-radius:100px; overflow:hidden; }
.goal-bar-fill { height:100%; border-radius:100px; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width 1s cubic-bezier(.34,1.56,.64,1); }
.goal-info { display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:var(--text3); font-family:var(--font-num); font-weight:600; }

/* Theme */
.theme-content { font-size:15px; font-weight:600; line-height:1.8; padding:20px 24px; background:var(--elevated); border-radius:var(--radius-sm); border-left:3px solid var(--accent); }

/* Filter */
.filter-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.filter-tab { padding:6px 14px; border-radius:100px; font-size:12px; font-weight:600; border:1px solid var(--border); background:transparent; color:var(--text3); cursor:pointer; transition:all .2s; font-family:'Noto Sans JP',sans-serif; }
.filter-tab:hover { border-color:var(--text2); color:var(--text); }
.filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Events */
.event-list { display:flex; flex-direction:column; gap:10px; }
.event-item { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius-sm); background:var(--elevated); }
.event-icon { width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:var(--card); border:1px solid var(--border); }
.event-info { flex:1; min-width:0; }
.event-name { font-size:13px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.event-meta { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.badge { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:700; }
.badge-official { background:rgba(17,17,17,0.06); color:var(--accent); }
.badge-agency { background:rgba(254,44,85,0.08); color:var(--accent2); }
.badge-completed { background:rgba(26,135,84,0.08); color:var(--success); }
.badge-ongoing { background:rgba(17,17,17,0.06); color:var(--accent); }
.badge-upcoming { background:rgba(230,126,34,0.08); color:var(--warning); }
.event-empty { text-align:center; padding:24px; color:var(--text3); font-size:13px; }

/* Battle */
.battle-table { width:100%; border-collapse:separate; border-spacing:0 6px; }
.battle-table th { text-align:left; font-size:10px; color:var(--text3); font-weight:600; padding:0 12px 4px; letter-spacing:0.5px; text-transform:uppercase; }
.battle-table td { padding:12px; background:var(--elevated); font-size:13px; font-weight:500; }
.battle-table tr td:first-child { border-radius:var(--radius-sm) 0 0 var(--radius-sm); }
.battle-table tr td:last-child { border-radius:0 var(--radius-sm) var(--radius-sm) 0; }
.battle-date { font-family:var(--font-num); font-weight:600; color:var(--text2); font-size:12px; }
.battle-opponent { font-weight:700; }
.battle-score { font-family:var(--font-num); font-weight:600; font-size:12px; color:var(--text2); }
.b-badge { display:inline-flex; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.b-badge.win { background:rgba(26,135,84,0.08); color:var(--success); }
.b-badge.lose { background:rgba(214,48,49,0.08); color:var(--danger); }
.b-badge.upcoming { background:rgba(230,126,34,0.08); color:var(--warning); }
.b-badge.completed { background:rgba(17,17,17,0.06); color:var(--text2); }
.sub-heading { font-size:12px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* Footer */
.footer { text-align:center; padding:20px; color:var(--text3); font-size:11px; font-weight:500; }
.footer .brand { color:var(--accent); font-weight:700; font-family:var(--font-num); }

/* Loading / Error */
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:24px; }
.loading-spinner { width:40px; height:40px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--text3); font-size:13px; }
.error-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:14px; text-align:center; }
.error-icon { font-size:40px; } .error-title { font-size:18px; font-weight:700; color:var(--danger); }
.error-message { color:var(--text2); font-size:13px; max-width:380px; line-height:1.6; }

/* Anim */
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.animate-in { animation:fadeUp .45s ease forwards; opacity:0; }
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}
.d9{animation-delay:.45s}.d10{animation-delay:.5s}.d11{animation-delay:.55s}

@media(max-width:640px){
  .kpi-grid,.kpi-row-2{grid-template-columns:repeat(2,1fr)}
  .kpi-value{font-size:24px} .header{flex-direction:column;text-align:center}
  .app{padding:16px 12px 40px} .chart-bar{width:36px}
}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">読み込み中...</div></div></div>
<script>
const CONFIG={GAS_URL:"YOUR_GAS_WEBAPP_URL_HERE",TOKEN:"your-secret-token-here",GOAL_DIAMOND:400000};
const params=new URLSearchParams(window.location.search);const LIVER_ID=params.get("id")||"";
const DEMO_MONTH_DATA={success:true,liver:{id:"2ki_chan",name:"つき",registrationDate:"2025/10/08"},months:[
{monthId:2604,monthKey:"2026-04",label:"4月",diamond:306312,revenue:229734,hourly:12059,streamHours:25.4,streamDays:7,followers:503},
{monthId:2603,monthKey:"2026-03",label:"3月",diamond:278450,revenue:208838,hourly:6661,streamHours:41.8,streamDays:12,followers:1380},
{monthId:2602,monthKey:"2026-02",label:"2月",diamond:245100,revenue:183825,hourly:6963,streamHours:35.2,streamDays:10,followers:1166}]};
const DEMO_EVENTS={"2026-04":[{name:"春の配信祭り 2026",type:"official",period:"4/1 〜 4/30",status:"ongoing"},{name:"新人ライバー応援キャンペーン",type:"agency",period:"4/10 〜 4/20",status:"ongoing"},{name:"GWスペシャルイベント",type:"official",period:"4/25 〜 5/6",status:"upcoming"}],"2026-03":[{name:"ひなまつりLIVEフェス",type:"official",period:"3/1 〜 3/14",status:"completed"},{name:"事務所内ランキングバトル",type:"agency",period:"3/15 〜 3/31",status:"completed"},{name:"桜チャレンジ配信",type:"official",period:"3/20 〜 3/31",status:"completed"}],"2026-02":[{name:"バレンタインLIVE祭",type:"official",period:"2/1 〜 2/14",status:"completed"},{name:"冬の配信マラソン",type:"agency",period:"2/10 〜 2/28",status:"completed"}]};
const DEMO_BATTLES={"2026-04":[{date:"4/20",time:"22:00",opponent:"ひなた",result:"upcoming",myScore:null,oppScore:null},{date:"4/18",time:"21:00",opponent:"みゆき",result:"upcoming",myScore:null,oppScore:null},{date:"4/12",time:"20:30",opponent:"あかり",result:"completed",myScore:48520,oppScore:31200,winlose:"win"},{date:"4/8",time:"21:00",opponent:"れいな",result:"completed",myScore:62300,oppScore:45100,winlose:"win"},{date:"4/3",time:"19:00",opponent:"ゆうき",result:"completed",myScore:28400,oppScore:35600,winlose:"lose"}],"2026-03":[{date:"3/28",time:"21:30",opponent:"さくら",result:"completed",myScore:55100,oppScore:42300,winlose:"win"},{date:"3/22",time:"20:00",opponent:"まお",result:"completed",myScore:71200,oppScore:38900,winlose:"win"},{date:"3/15",time:"22:00",opponent:"ひなた",result:"completed",myScore:33400,oppScore:41200,winlose:"lose"},{date:"3/8",time:"21:00",opponent:"りこ",result:"completed",myScore:44800,oppScore:29600,winlose:"win"}],"2026-02":[{date:"2/25",time:"20:00",opponent:"みゆき",result:"completed",myScore:39200,oppScore:28100,winlose:"win"},{date:"2/18",time:"21:00",opponent:"あかり",result:"completed",myScore:25600,oppScore:32400,winlose:"lose"},{date:"2/10",time:"19:30",opponent:"ゆうき",result:"completed",myScore:51300,oppScore:44200,winlose:"win"}]};
const DEMO_THEMES={"2026-04":"イベントで1位取る。そのために配信時間を1日30分ずつ増やす。","2026-03":"すっぴん配信、飯食い配信を絶対にしない","2026-02":"明るく元気に朗らかに"};
const DEMO_RANKING={"2026-04":{rank:8,total:102},"2026-03":{rank:12,total:98},"2026-02":{rank:15,total:95}};
const IS_DEMO=!LIVER_ID||CONFIG.GAS_URL==="YOUR_GAS_WEBAPP_URL_HERE";

async function fetchData(){if(IS_DEMO){renderDashboard(DEMO_MONTH_DATA);return}try{const u=`${CONFIG.GAS_URL}?id=${encodeURIComponent(LIVER_ID)}&token=${encodeURIComponent(CONFIG.TOKEN)}`;const r=await fetch(u);const d=await r.json();if(d.error){showError("エラー",d.message);return}if(!d.months||!d.months.length){showError("データなし","表示できるデータがまだありません。");return}renderDashboard(d)}catch(e){showError("通信エラー","サーバーに接続できませんでした。")}}
function showError(t,m){document.getElementById("app").innerHTML=`<div class="error-screen"><div class="error-icon">⚠️</div><div class="error-title">${t}</div><div class="error-message">${(m||"").replace(/\n/g,"<br>")}</div></div>`}

let ci=0,dd=null,ef="all";
function renderDashboard(d){dd=d;render()}
function fmt(n){return Math.round(n).toLocaleString("ja-JP")}
function calcExtra(m){const avg=m.streamDays>0?(m.streamHours/m.streamDays).toFixed(1):"0";const hr=m.streamHours>0?Math.round(m.diamond/m.streamHours):0;const rev=Math.round(m.diamond*0.75);return{...m,avgHours:avg,hourly:hr,revenue:rev}}
function getTrend(ms,i,f){if(i>=ms.length-1)return null;const c=ms[i][f],p=ms[i+1][f];if(!p)return null;const pc=((c-p)/p*100).toFixed(1);return{pct:Math.abs(pc),up:c>=p}}
function trendHTML(ms,i,f){const t=getTrend(ms,i,f);if(!t)return"";return`<div class="kpi-trend ${t.up?"up":"down"}">${t.up?"↑":"↓"} ${t.pct}%</div>`}
function statusBadge(s){if(s==="completed")return`<span class="badge badge-completed">終了</span>`;if(s==="ongoing")return`<span class="badge badge-ongoing">参加中</span>`;return`<span class="badge badge-upcoming">予定</span>`}

function render(){
const d=dd,months=d.months.map(calcExtra),m=months[ci],mk=m.monthKey;
const gp=Math.min(100,(m.diamond/CONFIG.GOAL_DIAMOND*100)).toFixed(1);
const cm=[...months].reverse(),mx=Math.max(...cm.map(x=>x.diamond));
const av=d.liver.name?d.liver.name.charAt(0):"?";
const ae=DEMO_EVENTS[mk]||[],fe=ef==="all"?ae:ae.filter(e=>e.type===ef);
const bt=DEMO_BATTLES[mk]||[],bc=bt.length,bu=bt.filter(b=>b.result==="upcoming"),bd=bt.filter(b=>b.result==="completed");
const th=DEMO_THEMES[mk]||"";
const rk=DEMO_RANKING[mk]||{rank:"-",total:"-"};

document.getElementById("app").innerHTML=`
<div class="header animate-in d1">
  <div class="avatar">${av}</div>
  <div class="header-info">
    <div class="header-name">${d.liver.name}</div>
    <div class="header-id">@<span>${d.liver.id}</span></div>
    <div class="header-badge">★ LIVE Partner</div>
    ${d.liver.registrationDate?`<div class="header-reg">登録日: ${d.liver.registrationDate}</div>`:""}
  </div>
</div>

<div class="month-selector animate-in d2">
  ${months.map((mo,i)=>`<button class="month-btn ${i===ci?"active":""}" data-idx="${i}">${mo.label}</button>`).join("")}
</div>

<div class="kpi-grid animate-in d3">
  <div class="kpi-card"><div class="kpi-label">💎 ダイヤ</div><div class="kpi-value diamond">${fmt(m.diamond)}</div>${trendHTML(months,ci,"diamond")}</div>
  <div class="kpi-card"><div class="kpi-label">💰 配信報酬</div><div class="kpi-value revenue">¥${fmt(m.revenue)}</div><div class="kpi-sub">ダイヤ × 0.75</div>${trendHTML(months,ci,"revenue")}</div>
  <div class="kpi-card"><div class="kpi-label">⏱ 時給</div><div class="kpi-value">¥${fmt(m.hourly)}</div><div class="kpi-sub">ダイヤ ÷ 配信時間</div>${trendHTML(months,ci,"hourly")}</div>
</div>
<div class="kpi-row-2 animate-in d4">
  <div class="kpi-card"><div class="kpi-label">📅 配信日数</div><div class="kpi-value">${m.streamDays}<span class="kpi-unit">日</span></div>${trendHTML(months,ci,"streamDays")}</div>
  <div class="kpi-card"><div class="kpi-label">🕐 配信時間</div><div class="kpi-value">${m.streamHours}<span class="kpi-unit">h</span></div><div class="kpi-sub">平均 ${m.avgHours}h／回</div>${trendHTML(months,ci,"streamHours")}</div>
  <div class="kpi-card"><div class="kpi-label">⚔️ バトル回数</div><div class="kpi-value">${bc}<span class="kpi-unit">回</span></div></div>
</div>

<div class="section-card animate-in d5">
  <div class="section-title"><span class="dot dot-a"></span>事務所内ランキング</div>
  <div class="ranking-inline">
    <div class="ranking-pos">${rk.rank}<span style="font-size:16px;letter-spacing:0">位</span></div>
    <div class="ranking-detail">
      <div class="ranking-label">${m.label}の事務所内順位</div>
      <div class="ranking-total">${rk.total}人中</div>
    </div>
  </div>
</div>

<div class="section-card animate-in d6">
  <div class="section-title"><span class="dot dot-a"></span>ダイヤ推移</div>
  <div class="chart-container">
    <div class="chart-y-axis"><span class="chart-y-label">${fmt(Math.ceil(mx/1000)*1000)}</span><span class="chart-y-label">${fmt(Math.ceil(mx/2000)*1000)}</span><span class="chart-y-label">0</span></div>
    ${cm.map((mo,i)=>{const h=mx>0?(mo.diamond/mx)*140:0;const ia=mo.monthKey===m.monthKey;return`<div class="chart-bar-group"><div class="chart-bar-wrapper"><div class="chart-bar ${ia?"bar-active":"bar-inactive"} bar-animate" style="height:${h}px;animation-delay:${.5+i*.12}s" data-monthkey="${mo.monthKey}"><div class="chart-bar-value">${fmt(mo.diamond)}</div></div></div><span class="chart-x-label">${mo.label}</span></div>`}).join("")}
  </div>
</div>

<div class="section-card animate-in d7">
  <div class="goal-header"><div class="section-title" style="margin-bottom:0"><span class="dot dot-b"></span>月間ダイヤ目標</div><div class="goal-percentage">${gp}%</div></div>
  <div class="goal-bar-track" style="margin-top:16px"><div class="goal-bar-fill" style="width:0%" id="goalBar"></div></div>
  <div class="goal-info"><span>現在 ${fmt(m.diamond)}</span><span>目標 ${fmt(CONFIG.GOAL_DIAMOND)}</span></div>
</div>

${th?`<div class="section-card animate-in d8"><div class="section-title"><span class="dot dot-a"></span>今月のテーマ</div><div class="theme-content">${th}</div></div>`:""}

<div class="section-card animate-in d9">
  <div class="section-title"><span class="dot dot-a"></span>参加イベント</div>
  <div class="filter-tabs">
    <button class="filter-tab ${ef==="all"?"active":""}" data-filter="all">すべて</button>
    <button class="filter-tab ${ef==="official"?"active":""}" data-filter="official">TikTok LIVE公式</button>
    <button class="filter-tab ${ef==="agency"?"active":""}" data-filter="agency">事務所イベント</button>
  </div>
  <div class="event-list">
    ${fe.length===0?`<div class="event-empty">イベントはありません</div>`:fe.map(ev=>`<div class="event-item"><div class="event-icon">${ev.type==="official"?"🏆":"🏢"}</div><div class="event-info"><div class="event-name">${ev.name}</div><div class="event-meta"><span class="badge badge-${ev.type}">${ev.type==="official"?"公式":"事務所"}</span>${statusBadge(ev.status)}<span>📅 ${ev.period}</span></div></div></div>`).join("")}
  </div>
</div>

<div class="section-card animate-in d10">
  <div class="section-title"><span class="dot dot-c"></span>予約バトル管理</div>
  ${bu.length>0?`<div style="margin-bottom:18px"><div class="sub-heading" style="color:var(--warning)">🕐 予定</div><table class="battle-table"><thead><tr><th>日時</th><th>対戦相手</th><th>ステータス</th></tr></thead><tbody>${bu.map(b=>`<tr><td class="battle-date">${b.date} ${b.time}</td><td class="battle-opponent">${b.opponent}</td><td><span class="b-badge upcoming">予定</span></td></tr>`).join("")}</tbody></table></div>`:""}
  ${bd.length>0?`<div><div class="sub-heading" style="color:var(--text3)">✓ 完了</div><table class="battle-table"><thead><tr><th>日時</th><th>対戦相手</th><th>スコア</th><th>結果</th><th>ステータス</th></tr></thead><tbody>${bd.map(b=>`<tr><td class="battle-date">${b.date} ${b.time}</td><td class="battle-opponent">${b.opponent}</td><td class="battle-score">${fmt(b.myScore)} vs ${fmt(b.oppScore)}</td><td><span class="b-badge ${b.winlose}">${b.winlose==="win"?"WIN":"LOSE"}</span></td><td><span class="b-badge completed">完了</span></td></tr>`).join("")}</tbody></table></div>`:""}
  ${bt.length===0?`<div class="event-empty">バトル記録はありません</div>`:""}
</div>

<div class="footer animate-in d11">Powered by <span class="brand">TikTok LIVE Agency</span> Dashboard</div>`;

setTimeout(()=>{const b=document.getElementById("goalBar");if(b)b.style.width=gp+"%"},500);
document.querySelectorAll(".month-btn").forEach(b=>b.addEventListener("click",()=>{ci=parseInt(b.dataset.idx);ef="all";render()}));
document.querySelectorAll(".chart-bar").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.monthkey;const i=months.findIndex(mo=>mo.monthKey===k);if(i>=0){ci=i;ef="all";render()}}));
document.querySelectorAll(".filter-tab").forEach(t=>t.addEventListener("click",()=>{ef=t.dataset.filter;render()}));
}
fetchData();
</script>
</body>
</html>
